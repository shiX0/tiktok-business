name: CI
on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          cache: true
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci